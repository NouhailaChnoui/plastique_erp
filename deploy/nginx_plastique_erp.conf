# Remplacez "votredomaine.com" par votre nom de domaine réel partout dans ce fichier
# Remplacez "/home/django/plastique_erp" par le chemin réel du projet sur le VPS

server {
    listen 80;
    server_name votredomaine.com www.votredomaine.com;

    client_max_body_size 20M;

    location /static/ {
        alias /home/django/plastique_erp/staticfiles/;
    }

    location /media/ {
        alias /home/django/plastique_erp/media/;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/home/django/plastique_erp/plastique_erp.sock;
    }
}
