version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: plastique_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password_a_changer}
      MYSQL_DATABASE: ${DB_NAME:-plastique_erp}
      MYSQL_USER: ${DB_USER:-plastique_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-plastique_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: plastique_phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    ports:
      - "8080:80"

volumes:
  mysql_data:
