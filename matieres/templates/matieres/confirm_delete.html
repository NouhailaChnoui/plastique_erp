{% extends "core/base.html" %}
{% load i18n %}
{% block page_title %}{% trans "Supprimer la matière" %}{% endblock %}
{% block content %}
<div class="card-form mx-auto" style="max-width:480px;">
  <p>Confirmez-vous la suppression de <strong>{{ materiau.nom }}</strong> ?</p>
  <form method="post">
    {% csrf_token %}
    <div class="d-flex justify-content-end gap-2">
      <a href="{% url 'matieres:liste' %}" class="btn btn-outline-secondary">{% trans "Annuler" %}</a>
      <button class="btn btn-danger">{% trans "Supprimer" %}</button>
    </div>
  </form>
</div>
{% endblock %}
