{% extends "core/base.html" %}
{% load i18n %}
{% block title %}{{ titre }}{% endblock %}
{% block page_title %}{{ titre }}{% endblock %}
{% block content %}
<div class="card-form mx-auto" style="max-width:480px;">
  <form method="post">
    {% csrf_token %}
    <div class="mb-3"><label class="form-label">{% trans "Nom de la matière" %}</label>{{ form.nom }}</div>
    <div class="mb-3"><label class="form-label">{% trans "Code" %}</label>{{ form.code }}</div>
    <div class="form-check mb-4">{{ form.actif }}<label class="form-check-label ms-1">Matière active</label></div>
    <div class="d-flex justify-content-end gap-2">
      <a href="{% url 'matieres:liste' %}" class="btn btn-outline-secondary">{% trans "Annuler" %}</a>
      <button class="btn btn-primary">{% trans "Enregistrer" %}</button>
    </div>
  </form>
</div>
{% endblock %}
